<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入賞ランキング</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #020617, #000);
  font-family: system-ui, sans-serif;
  color:#e5e7eb;
}

.header{
  text-align:center;
  padding:18px;
  font-size:1.4rem;
  letter-spacing:0.15em;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:16px;
}

.tab{
  padding:8px 14px;
  border-radius:12px;
  background:#1f2937;
  cursor:pointer;
}

.tab.active{
  background:#facc15;
  color:#000;
  font-weight:bold;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

.card{
  display:flex;
  gap:14px;
  background:linear-gradient(180deg,#0f172a,#020617);
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  align-items:center;
}

.rank{
  font-size:1.3rem;
  width:60px;
  text-align:center;
}

.pet-img{
  width:72px;
  height:72px;
  border-radius:12px;
  background:#000;
}

.stats{
  display:flex;
  gap:12px;
  font-size:0.9rem;
}

.win{
  margin-left:auto;
  font-weight:bold;
  color:#facc15;
}

/* =========================
   🏆 TOP3 エフェクト
========================= */

.card.gold {
  background: linear-gradient(135deg, #facc15, #b45309);
  color: #000;
  box-shadow: 0 0 20px rgba(250,204,21,0.8);
  animation: glowGold 1.5s infinite alternate;
}

.card.silver {
  background: linear-gradient(135deg, #d1d5db, #6b7280);
  color: #000;
}

.card.bronze {
  background: linear-gradient(135deg, #cd7f32, #7c2d12);
  color: #000;
}

@keyframes glowGold {
  from {
    box-shadow: 0 0 10px rgba(250,204,21,0.5);
  }
  to {
    box-shadow: 0 0 30px rgba(250,204,21,1);
  }
}
</style>
</head>

<body>

<div class="header">🏆 入賞ランキング</div>

<div class="tabs">
  <div class="tab active" data-distance="短距離">短距離</div>
  <div class="tab" data-distance="マイル">マイル</div>
  <div class="tab" data-distance="中距離">中距離</div>
  <div class="tab" data-distance="長距離">遠距離</div>
</div>

<div class="container" id="rankingList"></div>

<script>
const API_BASE = "https://oasisbot-production.up.railway.app";
const DEFAULT_GUILD_ID = "1420918259187712093";
const params = new URLSearchParams(window.location.search);
const GUILD_ID = params.get("guild") || DEFAULT_GUILD_ID;

const PASSIVE_INFO = {
  speed_s:{emoji:"🏃",label:"スピード小アップ"},
  stamina_s:{emoji:"🫀",label:"スタミナ小アップ"},
  power_s:{emoji:"💥",label:"パワー小アップ"},
  speed_l:{emoji:"🚀",label:"スピード大アップ"},
  stamina_l:{emoji:"❤️‍🔥",label:"スタミナ大アップ"},
  power_l:{emoji:"💣",label:"パワー大アップ"},
  jack_of_all:{emoji:"🌈",label:"器用貧乏"},
  muscle_head:{emoji:"💪",label:"脳筋"},
  speed_star:{emoji:"⚡",label:"スピードスター"},
  steady_runner:{emoji:"🐢",label:"マイペース"},
  gambler:{emoji:"🔥",label:"勝負師"},
  turf_specialist:{emoji:"🌱",label:"芝得意"},
  dirt_specialist:{emoji:"🏜️",label:"ダート得意"},
  same_kind_boost:{emoji:"👥",label:"同族嫌悪"},
  short_special:{emoji:"🏎️",label:"短距離得意"},
  mile_special:{emoji:"🏇",label:"マイル得意"},
  middle_special:{emoji:"🏃‍♂️",label:"中距離得意"},
  long_special:{emoji:"🌌",label:"遠距離得意"}
};

async function loadRanking(distance){

  const res = await fetch(`${API_BASE}/api/ranking/${GUILD_ID}/${distance}`);
  const data = await res.json();

  const list = document.getElementById("rankingList");
  list.innerHTML = "";

  if (!data.results || data.results.length === 0) {
    list.innerHTML = "<div style='text-align:center; color:#9ca3af;'>まだ1着データがありません</div>";
    return;
  }

  data.results.forEach((r,i)=>{

    const speed = r.base_speed + r.train_speed;
    const power = r.base_power + r.train_power;
    const stamina = r.base_stamina + r.train_stamina;

    const p = PASSIVE_INFO[r.passive_skill] || null;

    const card = document.createElement("div");
    card.className = "card";
    
    if (i === 0) card.classList.add("gold");
    if (i === 1) card.classList.add("silver");
    if (i === 2) card.classList.add("bronze");

    card.innerHTML = `
      <div class="rank">
        ${i === 0 ? "👑 1位" :
          i === 1 ? "🥈 2位" :
          i === 2 ? "🥉 3位" :
          `${i+1}位`}
      </div>

      <img class="pet-img" src="/pets/${r.adult_key}.png">

      <div>
        <div><b>${r.name}</b> (ID:${r.user_id})</div>

        <div class="stats">
          <div>S:${r.base_speed}+${r.train_speed} (${speed})</div>
          <div>P:${r.base_power}+${r.train_power} (${power})</div>
          <div>St:${r.base_stamina}+${r.train_stamina} (${stamina})</div>
        </div>

        <div>
          ${p ? p.emoji + " " + p.label : "🧩 パッシブなし"}
        </div>
      </div>

      <div class="win">${r.win_count}勝</div>
    `;

    list.appendChild(card);
  });
}

document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    loadRanking(tab.dataset.distance);
  };
});

loadRanking("短距離");
</script>

</body>
</html>
